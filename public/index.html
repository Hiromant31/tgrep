<!DOCTYPE html>
<html>
<head>
    <title>Simple Chat</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        * { box-sizing: border-box; }
        body { font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; margin: 0; background: #e5ddd5; }
        
        #messages { 
            list-style-type: none; margin: 0; padding: 15px; flex-grow: 1; 
            overflow-y: auto; display: flex; flex-direction: column; 
        }

        /* Общий стиль сообщения */
        #messages li { 
            padding: 8px 12px; margin-bottom: 8px; border-radius: 10px; 
            max-width: 75%; word-wrap: break-word; position: relative;
            box-shadow: 0 1px 1px rgba(0,0,0,0.1); font-size: 15px;
        }

        /* МОИ сообщения (справа) */
        .my-msg { 
            align-self: flex-end; 
            background: #dcf8c6 !important; /* Светло-зеленый как в ТГ/WA */
            border-bottom-right-radius: 2px !important;
        }

        /* ЧУЖИЕ сообщения (слева) */
        .other-msg { 
            align-self: flex-start; 
            background: white; 
            border-bottom-left-radius: 2px !important;
        }

        #form { display: flex; padding: 10px; background: #f0f0f0; position: sticky; bottom: 0; }
        #input { flex-grow: 1; padding: 12px; border: 1px solid #ddd; border-radius: 20px; outline: none; }
        button { background: #007bff; color: white; border: none; border-radius: 50%; margin-left: 8px; width: 45px; height: 45px; cursor: pointer; }
    </style>
</head>
<body>
    <ul id="messages"></ul>
    <form id="form">
      <input id="input" autocomplete="off" placeholder="Сообщение..." /><button>></button>
    </form>

    <script src="/socket.io/socket.io.js"></script>
    <script>
      var socket = io();
      // Генерируем уникальный ID для этой вкладки
      var myId = Math.random().toString(36).substring(7);

      var form = document.getElementById('form');
      var input = document.getElementById('input');
      var messages = document.getElementById('messages');

      form.addEventListener('submit', function(e) {
        e.preventDefault();
        if (input.value) {
          // Отправляем объект: текст + наш ID
          socket.emit('chat message', { text: input.value, authorId: myId });
          input.value = '';
        }
      });

      socket.on('chat message', function(data) {
        var item = document.createElement('li');
        item.textContent = data.text;
        
        // Если ID автора совпадает с нашим — красим в зеленый и вправо
        if (data.authorId === myId) {
            item.classList.add('my-msg');
        } else {
            item.classList.add('other-msg');
        }

        messages.appendChild(item);
        messages.scrollTo(0, messages.scrollHeight);
      });
    </script>
</body>
</html>
