<!DOCTYPE html>
<html>
<head>
    <title>Simple Chat</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            margin: 0; 
            background: #e5ddd5; /* Цвет как в WhatsApp */
        }

        /* Контейнер для сообщений */
        #messages { 
            list-style-type: none; 
            margin: 0; 
            padding: 15px; 
            flex-grow: 1; 
            overflow-y: auto; 
            display: flex; 
            flex-direction: column; /* Сообщения идут сверху вниз */
        }

        /* Стиль самих облачков сообщений */
        #messages li { 
            padding: 8px 12px; 
            margin-bottom: 8px; 
            background: white; 
            border-radius: 8px; 
            max-width: 80%; 
            word-wrap: break-word;
            box-shadow: 0 1px 1px rgba(0,0,0,0.1);
            align-self: flex-start; /* Прижимаем к левому краю */
        }

        /* Форма ввода, прижатая к низу */
        #form { 
            display: flex; 
            padding: 10px; 
            background: #f0f0f0; 
            border-top: 1px solid #ccc;
            position: sticky; /* Чтобы не уплывала на мобилках */
            bottom: 0;
        }

        #input { 
            flex-grow: 1; 
            padding: 12px; 
            border: 1px solid #ddd; 
            border-radius: 20px; 
            outline: none;
            font-size: 16px; /* Чтобы iOS не увеличивал экран при фокусе */
        }

        button { 
            padding: 0 15px; 
            background: #007bff; 
            color: white; 
            border: none; 
            border-radius: 50%; 
            margin-left: 8px; 
            font-weight: bold;
            cursor: pointer;
            width: 45px;
            height: 45px;
        }
    </style>
</head>
<body>
    <ul id="messages"></ul>
    <form id="form" action="">
      <input id="input" autocomplete="off" placeholder="Сообщение..." /><button>></button>
    </form>

    <script src="/socket.io/socket.io.js"></script>
    <script>
      var socket = io();
      var form = document.getElementById('form');
      var input = document.getElementById('input');
      var messages = document.getElementById('messages');

      form.addEventListener('submit', function(e) {
        e.preventDefault();
        if (input.value) {
          socket.emit('chat message', input.value);
          input.value = '';
        }
      });

      socket.on('chat message', function(msg) {
        var item = document.createElement('li');
        item.textContent = msg;
        messages.appendChild(item);
        
        // Автопрокрутка вниз при новом сообщении
        messages.scrollTo(0, messages.scrollHeight);
      });
    </script>
</body>
</html>
